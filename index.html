<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREVER STORE | CYBER CHECKER</title>
    <!-- استدعاء Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- خطوط شبابية حادة ومتناسقة للـ Gaming -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #030712;
            background-image: radial-gradient(circle at 50% 50%, #1e113a 0%, #030712 100%);
        }
        .cyber-logo { font-family: 'Orbitron', sans-serif; }
        .neon-glow-purple {
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            text-shadow: 0 0 8px rgba(168, 85, 247, 0.6);
        }
        .neon-glow-cyan {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
        .cyber-border {
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
        .cyber-border:focus-within {
            border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between selection:bg-cyan-500 selection:text-black">

    <!-- الهيدر السايبيري -->
    <header class="border-b border-purple-900/40 bg-gray-950/70 backdrop-blur-md sticky top-0 z-50 px-4 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="cyber-logo text-2xl font-black tracking-widest text-purple-500 neon-glow-purple">FOREVER STORE</h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></span>
                <span class="text-xs tracking-wider text-cyan-400 font-bold uppercase">System Online</span>
            </div>
        </div>
    </header>

    <!-- واجهة الفحص والتحقق المركزية -->
    <main class="max-w-xl w-full mx-auto px-4 py-12 flex-grow flex flex-col justify-center">
        <div class="bg-gray-950/80 border-2 border-purple-500/20 p-8 rounded-3xl shadow-2xl relative overflow-hidden backdrop-blur-xl">
            
            <!-- تأثيرات ضوئية خلفية -->
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-purple-600/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-cyan-600/10 rounded-full blur-3xl"></div>

            <div class="text-center mb-8 relative z-10">
                <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-purple-200 to-cyan-400 mb-3">نظام التحقق الذكي</h2>
                <p class="text-gray-400 text-sm">أدخل رابط المنشور أو الريل للتأكد من حالة توفر حساب السوني فوراً</p>
            </div>

            <!-- حقل الإدخال وزر الفحص -->
            <div class="space-y-4 relative z-10">
                <div class="cyber-border bg-gray-900/90 rounded-2xl p-2 transition duration-300">
                    <label class="block text-[10px] uppercase tracking-widest text-purple-400 font-bold mb-1 mr-2">Instagram Link Input</label>
                    <input type="text" id="reel-input" placeholder="https://www.instagram.com/..." 
                           class="w-full bg-transparent text-left px-2 py-2 text-sm text-cyan-300 placeholder-gray-600 focus:outline-none tracking-wide">
                </div>
                
                <button onclick="checkAccount()" class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 hover:from-purple-500 hover:to-cyan-500 text-gray-950 font-black text-base py-4 px-4 rounded-2xl transition duration-300 tracking-wide uppercase shadow-lg neon-glow-cyan transform hover:scale-[1.01] active:scale-[0.99]">
                    اضغط لبدء الفحص ⚡
                </button>
            </div>

            <!-- قسم إظهار نتيجة الفحص -->
            <div id="result-container" class="mt-8 hidden transition duration-500">
                <!-- يتم تعبئتها ديناميكياً -->
            </div>
        </div>
    </main>

    <!-- الفوتر مع رابط الإنستاجرام المطلوب بآخر الصفحة -->
    <footer class="text-center py-8 px-4 flex flex-col items-center justify-center gap-4 border-t border-purple-950/20 bg-gray-950/40">
        <a href="https://www.instagram.com/forever_store_jo/" target="_blank" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl border border-purple-500/30 bg-purple-950/20 text-purple-400 hover:text-purple-300 font-bold text-sm tracking-wide transition duration-300 hover:border-purple-500/60 shadow-lg hover:shadow-purple-500/10">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            تابعنا وتواصل معنا عبر إنستاجرام
        </a>
        <div class="text-[10px] tracking-widest font-mono text-purple-900/50">
            &copy; 2026 FOREVER STORE // ALL RIGHTS RESERVED.
        </div>
    </footer>

    <!-- نظام التشغيل وقاعدة البيانات المدمجة -->
    <script>
        const accountsData = [
          {
            "reel_url": "https://www.instagram.com/p/DY-Qq3CMceq",
            "status": "available",
            "price": "10 JOD"
          },
          {
            "reel_url": "https://www.instagram.com/p/DX4L6bds1p_",
            "status": "available",
            "price": "10 JOD"
          },
          {
            "reel_url": "https://www.instagram.com/p/DX4MI_bMZLf",
            "status": "available",
            "price": "10 JOD"
          },
          {
            "reel_url": "https://www.instagram.com/p/DUnq4z_jIKW",
            "status": "available",
            "price": "Unknown (تشكيلة)"
          }
        ];

        const storeConfig = {
            cliq_or_orange: "0780123835",
            name: "Maryam",
            instagram_profile: "https://www.instagram.com/forever_store_jo/"
        };

        async function checkAccount() {
            const inputUrl = document.getElementById('reel-input').value.trim();
            const resultContainer = document.getElementById('result-container');
            
            if (!inputUrl) {
                alert("يا غالي، حط رابط الريل أو المنشور أولاً عشان نفحصه!");
                return;
            }

            resultContainer.classList.remove('hidden');
            resultContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center py-4 space-y-2">
                    <div class="w-6 h-6 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-center text-cyan-400 font-mono text-xs tracking-widest uppercase">Scanning Mainframe...</p>
                </div>`;

            setTimeout(() => {
                let cleanInput = inputUrl.split('?')[0].replace(/\/$/, "");
                cleanInput = cleanInput.replace("://m.instagram.com", "://www.instagram.com");

                const foundAccount = accountsData.find(acc => {
                    let cleanJsonUrl = acc.reel_url.split('?')[0].replace(/\/$/, "");
                    cleanJsonUrl = cleanJsonUrl.replace("://m.instagram.com", "://www.instagram.com");
                    return cleanJsonUrl === cleanInput;
                });

                if (foundAccount && foundAccount.status === 'available') {
                    // كرت الحساب المتوفر
                    resultContainer.innerHTML = `
                        <div class="bg-gradient-to-b from-green-950/40 to-gray-950 border-2 border-green-500/30 p-6 rounded-2xl text-center shadow-lg shadow-green-500/5">
                            <div class="inline-flex items-center gap-1.5 bg-green-500/10 border border-green-500/30 text-green-400 font-bold text-[11px] px-3 py-1 rounded-full mb-3 uppercase tracking-wider">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span> متاح حالياً
                            </div>
                            <h3 class="text-white font-extrabold text-xl mb-1">الحساب متوفر وجاهز للتسليم!</h3>
                            <p class="text-cyan-400 font-black text-2xl tracking-wide mb-4 font-mono">${foundAccount.price}</p>
                            
                            <div class="bg-gray-900/80 border border-gray-800 rounded-xl p-3 mb-4 text-right space-y-1.5 text-xs">
                                <p class="text-gray-400 font-bold text-center border-b border-gray-800 pb-1 mb-1 text-purple-400">💵 معلومات الدفع المعتمدة 💵</p>
                                <p class="flex justify-between"><span class="text-gray-500">كليك / أورانج موني:</span> <span class="text-green-400 font-mono font-bold">${storeConfig.cliq_or_orange}</span></p>
                                <p class="flex justify-between"><span class="text-gray-500">الاسم المعتمد:</span> <span class="text-white font-bold">${storeConfig.name}</span></p>
                            </div>

                            <button onclick="orderAccount('${foundAccount.reel_url}')" class="w-full bg-green-500 hover:bg-green-400 text-gray-950 font-black py-3 px-4 rounded-xl transition duration-300 tracking-wide">
                                انسخ الرابط وابعث الإشعار ديركت ←
                            </button>
                        </div>
                    `;
                } else {
                    // 🚨 تعديل المنطق: إذا كان الحساب "مباع" أو "غير مدرج بالنظام" يظهر هذا الكرت الأحمر الصريح 🚨
                    resultContainer.innerHTML = `
                        <div class="bg-gradient-to-b from-red-950/50 to-gray-950 border-2 border-red-500/40 p-6 rounded-2xl text-center shadow-lg shadow-red-500/5">
                            <div class="inline-flex items-center gap-1.5 bg-red-500/10 border border-red-500/30 text-red-400 font-bold text-[11px] px-3 py-1 rounded-full mb-3 uppercase tracking-wider">
                                NOT AVAILABLE
                            </div>
                            <h3 class="text-gray-200 font-bold text-lg mb-1">غير مدرج بالنظام أو تم بيعه مسبقاً!</h3>
                            <p class="text-gray-500 text-xs px-4 mb-4">للأسف هذا الحساب لم نعد نملكه حالياً. يمكنك التحقق من ديركت الإنستاجرام مباشرة للتأكد من وجود بديل فوري.</p>
                            <a href="${storeConfig.instagram_profile}" target="_blank" class="inline-block bg-red-600 hover:bg-red-500 text-white font-bold text-xs py-2 px-4 rounded-lg transition duration-300">
                                تواصل معنا بالديركت للاستفسار ←
                            </a>
                        </div>
                    `;
                }
            }, 1000);
        }

        function orderAccount(reelUrl) {
            navigator.clipboard.writeText(reelUrl).then(() => {
                alert("تم نسخ رابط الحساب تلقائياً! حوّل المبلغ على المحفظة، وافتح الديركت معنا وأرسل الرابط مع صورة الإشعار لتسليمك الحساب فوراً.");
                window.open(storeConfig.instagram_profile, '_blank');
            }).catch(() => {
                window.open(storeConfig.instagram_profile, '_blank');
            });
        }
    </script>
</body>
</html>
